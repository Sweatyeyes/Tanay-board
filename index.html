<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Табло</title>
<style>
  body { margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; }
  img { max-width:100%; max-height:100%; }
</style>
</head>
<body>
<img id="board" src="" alt="Табло">
<script>
  const RAW_URL = "https://raw.githubusercontent.com/Sweatyeyes/Tanay-board/main/board.png";

  function refreshBoard() {
    document.getElementById('board').src = RAW_URL + '?t=' + Date.now();
  }
  refreshBoard();
  setInterval(refreshBoard, 30000); // обновление раз в 30 секунд
</script>
</body>
</html>
